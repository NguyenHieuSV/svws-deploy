    if(canOp&&c.trang_thai!=="XONG"){
      if(c.trang_thai==="MO")act+=`<button class="btn-sm ghost" onclick="capNhatCV(${c.id},'DANG_XU_LY')">Bắt đầu</button> `;
      act+=`<button class="btn-sm" onclick="capNhatCV(${c.id},'XONG')">Xong</button> `;
    }
    if(c.khach_hang_id)act+=`<button class="btn-sm ghost" onclick="openKH(${c.khach_hang_id})">Hồ sơ</button>`;
    if(laQTV())act+=` <button class="btn-sm ghost" style="color:var(--red)" title="Xóa việc" onclick="cvXoa(${c.id})">🗑</button>`;
    return `<tr class="${c.qua_han?'qh':''}">
      <td><b>${c.tieu_de}</b>${c.mo_ta?`<div style="color:var(--muted);font-size:12px">${c.mo_ta}</div>`:''}</td>
      <td>${c.khach_ten||(c.khach_hang_id?('KH #'+c.khach_hang_id):'—')}</td>
      <td><span class="badge ${pr}">${c.uu_tien}</span></td>
      <td>${han||'—'} ${c.qua_han?'<span class="badge b-tc">Quá hạn</span>':''}</td>
      <td>${stt}</td><td style="white-space:nowrap">${act||'—'}</td></tr>`;
  }).join('');
  host.innerHTML=`<div class="note" style="padding:0 0 12px">Việc tự sinh từ thư phản hồi, gán cho người phụ trách kèm hạn xử lý (SLA theo độ khẩn: Cao 4h · Trung 24h · Thấp 48h). Việc quá hạn được tô đỏ để leo thang.</div>
    <div class="panel"><div class="panel-h"><h3>Công việc từ phản hồi & việc tự thêm</h3><div class="spacer"></div>
      <select onchange="S.cvFilter=this.value;viewBanHang($('#main'))" style="margin-right:8px" data-nocbx>
        <option value="mo"${S.cvFilter==="mo"?" selected":""}>Đang mở</option>
        <option value="cua_toi"${S.cvFilter==="cua_toi"?" selected":""}>Của tôi</option>
        <option value="qua_han"${S.cvFilter==="qua_han"?" selected":""}>Quá hạn</option></select>
      ${canOp?'<button class="btn-sm" onclick="cvMoThem()">+ Thêm việc</button>':''}</div>
    <div class="panel-b"><table><thead><tr><th>Việc</th><th>Khách</th><th>Ưu tiên</th><th>Hạn xử lý (SLA)</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6" class="empty" style="padding:24px">Chưa có công việc.</td></tr>'}</tbody></table></div></div>`;
}

function _dashDemo(){
  const ph=(DEMO.phan_hoi||[]).filter(x=>x.ai_y_dinh==="QUAN_TAM").length;
  const ch=(DEMO.co_hoi||[]); const now=Date.now();
  const n_bg=ch.filter(c=>c.bao_gia_id).length, n_dh=ch.filter(c=>c.giai_doan==="THANG").length;
  const cvs=(DEMO.cong_viec||[]);
  const mo=cvs.filter(c=>c.trang_thai!=="XONG").length;
  const qh=cvs.filter(c=>c.trang_thai!=="XONG"&&c.han_xu_ly&&new Date(c.han_xu_ly).getTime()<now).length;
  const xong=cvs.filter(c=>c.trang_thai==="XONG");
  let dung=0; xong.forEach(c=>{if(c.hoan_thanh_luc&&c.han_xu_ly&&new Date(c.hoan_thanh_luc)<=new Date(c.han_xu_ly))dung++;});
  const pct=(a,b)=>b?Math.round(a/b*1000)/10:0;
  const gd={}; GD_LIST.forEach(g=>gd[g]=ch.filter(c=>c.giai_doan===g).length);
  return {pheu:{phan_hoi_quan_tam:ph,co_hoi:ch.length,bao_gia:n_bg,don_hang:n_dh},
    ty_le:{ph_to_cohoi:pct(ch.length,ph),cohoi_to_baogia:pct(n_bg,ch.length),baogia_to_donhang:pct(n_dh,n_bg)},
    doanh_thu_don:ch.filter(c=>c.giai_doan==="THANG").reduce((s,c)=>s+(c.gia_tri_dk||0),0),
    cong_viec:{mo,qua_han:qh,xong:xong.length,dung_han:dung,ty_le_dung_han:pct(dung,xong.length),gio_xu_ly_tb:0},
    co_hoi_theo_giai_doan:gd};
}

/* Mã NCC tự sinh (khớp quy tắc backend): chữ cái đầu tên (bỏ từ loại hình) + "-" + STT */
const _TU_LH_NCC=new Set("CONG TY CTY CO PHAN CP TNHH MTV DNTN TRACH NHIEM HUU HAN THANH VIEN MOT HAI THUONG MAI TM DICH VU DV KY THUAT KT SAN XUAT SX DAU TU XAY DUNG XD PHAT TRIEN QUOC TE TAP DOAN XNK NHAP KHAU JSC LTD CORP INC COMPANY LIMITED JOINT STOCK GROUP".split(" "));
function _maNccTuTen(ten,stt){
  const bo=(ten||'').replace(/[Đđ]/g,'D').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase();
  const tu=bo.split(/[^A-Z0-9]+/).filter(Boolean);
  const loi=tu.filter(w=>!_TU_LH_NCC.has(w));
  const dung=loi.length?loi:tu; let dau;
  if(dung.length===1) dau=dung[0].replace(/[^A-Z]/g,'').slice(0,3)||'NCC';   // 1 từ -> 3 chữ đầu: VEOLIA -> VEO
  else dau=dung.map(w=>w[0]).filter(c=>/[A-Z]/.test(c)).join('').slice(0,5)||'NCC';
  return dau+'-'+stt;
}

function _goiYDemo(hid, sl){
  const sups=(DEMO.ncc.suppliers||[]).filter(s=>!s.blacklist); const today=new Date();
  const gls={}; (DEMO.don_mua||[]).forEach(p=>(p.chi_tiet||[]).forEach(ct=>{if(ct.hang_hoa_id===hid)gls[p.nha_cung_cap_id]=ct.don_gia;}));
  const gbg={}; (DEMO.bao_gia_ncc||[]).forEach(b=>{if(b.hang_hoa_id===hid && (!b.hieu_luc_den||new Date(b.hieu_luc_den)>=today)){const cur=gbg[b.nha_cung_cap_id]; if(!cur||b.id>cur.id)gbg[b.nha_cung_cap_id]={id:b.id,gia:b.don_gia,hl:b.hieu_luc_den};}});
  const dh={}; (DEMO.don_mua||[]).forEach(p=>{if(p.ngay_giao_thuc&&p.ngay_hen_giao){const t=dh[p.nha_cung_cap_id]||{t:0,d:0};t.t++;if(new Date(p.ngay_giao_thuc)<=new Date(p.ngay_hen_giao))t.d++;dh[p.nha_cung_cap_id]=t;}});
  const giaDung=id=>gbg[id]?gbg[id].gia:(gls[id]||null);
  const prices=sups.map(s=>giaDung(s.id)).filter(Boolean); const gmin=prices.length?Math.min(...prices):null;
  let list=sups.map(s=>{
    const bg=gbg[s.id]; const g=giaDung(s.id); const nguon=bg?"BAO_GIA":(gls[s.id]?"LICH_SU":null);
    const td=dh[s.id]; const tyle=td&&td.t?Math.round(td.d/td.t*1000)/1000:null;
    const du=(DEMO.cong_no_ncc||[]).filter(x=>x.nha_cung_cap_id===s.id).reduce((a,x)=>a+(x.so_tien-(x.da_thanh_toan||0)),0);
    const hm=Number(s.han_muc_cong_no||0); const gtri=g?sl*g:null;
    const trong=(hm===0)||(gtri===null)||(du+gtri<=hm);
    const sg=(g&&gmin)?gmin/g:0.6, sdg=(s.diem_danh_gia||0)/5, sdh=tyle!=null?tyle:0.7;
    let diem=Math.round((100*(0.4*sg+0.3*sdg+0.3*sdh))*10)/10; if(!trong)diem=Math.round((diem-30)*10)/10;
    return {nha_cung_cap_id:s.id,ten:s.ten,gia_gan_nhat:g,gia_dung:g,gia_bao_gia:bg?bg.gia:null,gia_lich_su:gls[s.id]||null,
      nguon_gia:nguon,hieu_luc_den:bg?bg.hl:null,diem_danh_gia:s.diem_danh_gia||0,ty_le_dung_han:tyle,trong_han_muc:trong,diem_tong:diem,khuyen_nghi:false};
  }).sort((a,b)=>b.diem_tong-a.diem_tong);
  const best=list.find(x=>x.trong_han_muc); if(best)best.khuyen_nghi=true;
  return {hang_hoa_id:hid,goi_y_ncc_id:best?best.nha_cung_cap_id:null,danh_sach:list};
}

async function nccPoPdf(poId){

async function poDaMua(){
  const dh=Number(gv('damua_dh'))||0;
  const box=document.getElementById('daMuaBody'); if(!box)return;
  if(!dh){box.innerHTML='<div class="empty" style="padding:14px">Chưa chọn mã đơn bán.</div>';return;}
  let ds=[];
  if(S.mode==="live"){ try{ds=await api("/ncc/da-mua/"+dh);}catch(e){box.innerHTML=`<div class="empty" style="padding:14px;color:#dc2626">${e.detail||e.message}</div>`;return;} }
  else{
    const sups=DEMO.ncc.suppliers||[];
    (DEMO.don_mua||[]).forEach(p=>{ if(p.don_hang_id===dh&&p.trang_thai!=="TU_CHOI")
      (p.chi_tiet||[]).forEach(ct=>ds.push({po_so:p.so,ngay:p.ngay||'—',ncc_ten:((sups.find(s=>s.id===p.nha_cung_cap_id))||{}).ten||'—',
        hang_hoa:ct.ten||('HH#'+ct.hang_hoa_id),ma_hh:null,so_luong:ct.so_luong,so_luong_nhan:ct.so_luong_nhan||0,
        don_gia:ct.don_gia,thanh_tien:ct.so_luong*ct.don_gia,trang_thai:p.trang_thai})); });
  }
  const tong=ds.reduce((s,x)=>s+(x.thanh_tien||0),0);
  box.innerHTML=`<table><thead><tr><th>Mặt hàng</th><th>PO</th><th>Ngày</th><th>NCC</th><th class="num">SL đặt</th><th class="num">SL nhận</th><th class="num">Đơn giá</th><th class="num">Thành tiền</th><th>Trạng thái</th></tr></thead>
    <tbody>${ds.map(x=>`<tr><td><b>${x.hang_hoa}</b>${x.ma_hh?` <span style="color:var(--muted);font-size:11px">${x.ma_hh}</span>`:''}</td>
      <td>${x.po_so}</td><td style="white-space:nowrap">${x.ngay}</td><td>${x.ncc_ten||'—'}</td>
      <td class="num">${Number(x.so_luong)}</td><td class="num">${Number(x.so_luong_nhan)}</td>
      <td class="num">${vnd(x.don_gia)}</td><td class="num">${vnd(x.thanh_tien)}</td>
      <td>${x.trang_thai==='DA_DUYET'?'<span class="badge b-ok">Đã duyệt</span>':x.trang_thai==='TU_CHOI'?'<span class="badge b-tc">Từ chối</span>':'<span class="badge b-cho">Chờ duyệt</span>'}</td></tr>`).join('')
      ||'<tr><td colspan="9" class="empty" style="padding:14px">Mã này chưa mua mặt hàng nào.</td></tr>'}</tbody>
    ${ds.length?`<tfoot><tr><td colspan="7" style="text-align:right;font-weight:700">Tổng đã mua:</td><td class="num" style="font-weight:700">${vnd(tong)}</td><td></td></tr></tfoot>`:''}</table>`;
}

async function poSuaLuu(id){

  });

  const ncc=Number(gv('pos_ncc')), dh=gv('pos_dh')?Number(gv('pos_dh')):null, hen=gv('pos_hen')||null;
  const body={nha_cung_cap_id:ncc,don_hang_id:dh,ngay_hen_giao:hen,chi_tiet:items};
  if(S.mode==="live"){
    try{await api("/ncc/don-mua/"+id,{method:'PUT',body:JSON.stringify(body)});}
    catch(e){const ok=await _xuLyTrungMua(e,async()=>{await api("/ncc/don-mua/"+id,{method:'PUT',body:JSON.stringify({...body,xac_nhan_trung:true})});}); if(!ok)return;}
  }else{

    p.chi_tiet=items.map((it,i)=>{const h=(DEMO.hang_hoa||[]).find(x=>x.id===it.hang_hoa_id);return {id:(i+1)*100+id,hang_hoa_id:it.hang_hoa_id,ten:h?h.ten:('HH#'+it.hang_hoa_id),so_luong:it.so_luong,don_gia:it.don_gia,so_luong_nhan:0};});
    p.tong_tien=items.reduce((s,it)=>s+it.so_luong*it.don_gia,0);

  }

async function _xuLyTrungMua(e,guiLai){
  if(e&&e.status===409&&laQTV()){
    if(confirm((e.detail||"Mặt hàng đã mua cho mã bán hàng này.")+"\n\nBạn là CEO/ADMIN — XÁC NHẬN mua bổ sung?")){
      try{await guiLai();return true;}catch(e2){toast(e2.detail||e2.message,"err");return false;}
    }
    return false;
  }
  toast(e.detail||e.message,"err"); return false;
}
function _demoTrungMua(dh,hhIds){
  if(!dh)return false;
  const trung=[];
  (DEMO.don_mua||[]).forEach(p=>{ if(p.don_hang_id===dh&&p.trang_thai!=="TU_CHOI")
    (p.chi_tiet||[]).forEach(ct=>{ if(hhIds.includes(ct.hang_hoa_id))trung.push(`${ct.ten||('HH#'+ct.hang_hoa_id)} đã mua trong ${p.so}`); }); });
  if(!trung.length)return false;
  if(laQTV())return !confirm("⚠ TRÙNG MUA: "+trung.join(" | ")+"\n\nBạn là CEO/ADMIN — XÁC NHẬN mua bổ sung?");
  toast("⚠ TRÙNG MUA: "+trung.join(" | ")+" — chỉ CEO/ADMIN mới xác nhận mua bổ sung được.","err");
  return true;
}

  if(S.mode==="live"){ try{const r=await api(`/ncc/don-mua/${poId}/nhan-hang`,{method:'POST',body:JSON.stringify({chi_tiet,han_thanh_toan:han,tao_cong_no,dat_qc})});

    toast(msg,"ok");S.poRecv=null;viewNCC($("#main"));}catch(e){toast(e.detail||e.message,"err");} return; }
  let gtri=0;
  po.chi_tiet.forEach(ct=>{const v=Number(gv('rc_'+ct.id)||0); if(v>0){ct.so_luong_nhan=Number(ct.so_luong_nhan||0)+v; gtri+=v*ct.don_gia;
    const hh=(DEMO.hang_hoa||[]).find(x=>x.id===ct.hang_hoa_id); if(hh)hh.so_luong=Number(hh.so_luong)+v;}});
  const du=po.chi_tiet.every(ct=>Number(ct.so_luong_nhan)>=Number(ct.so_luong));
  const co=po.chi_tiet.some(ct=>Number(ct.so_luong_nhan)>0);
  po.trang_thai_nhan=du?"DU":(co?"MOT_PHAN":"CHUA"); po.ngay_giao_thuc=new Date().toISOString().slice(0,10);
  if(tao_cong_no&&gtri>0)DEMO.cong_no_ncc.push({id:Date.now(),nha_cung_cap_id:po.nha_cung_cap_id,so_tien:gtri,da_thanh_toan:0,han,trang_thai:"CHUA_TRA"});

  toast(`Đã nhận (demo) · ${vnd(gtri)} · ${po.trang_thai_nhan}${dgMsg}`,"ok"); S.poRecv=null; viewNCC($("#main"));
}
function _chamDiemDemo(po,dat_qc){
  const s=(DEMO.ncc.suppliers||[]).find(z=>z.id===po.nha_cung_cap_id); if(!s)return null;
  let s_ot=2; if(po.ngay_hen_giao&&po.ngay_giao_thuc){const tre=Math.floor((new Date(po.ngay_giao_thuc)-new Date(po.ngay_hen_giao))/864e5); s_ot=tre<=0?2:Math.max(0,2-0.2*tre);}
  const diem=Math.round(Math.min(5,Math.max(0,s_ot+(dat_qc?2:0)+1))*10)/10;
  DEMO.dg_log=DEMO.dg_log||[]; DEMO.dg_log.push({nha_cung_cap_id:s.id,don_mua_id:po.id,diem});
  const ds=DEMO.dg_log.filter(x=>x.nha_cung_cap_id===s.id).map(x=>x.diem);
  s.diem_danh_gia=Math.round(ds.reduce((a,b)=>a+b,0)/ds.length*10)/10;
  const kem=ds.filter(d=>d<2).length; if(s.diem_danh_gia<2&&kem>=2)s.blacklist=true;
  return {diem_giao_hang:diem,diem_danh_gia_moi:s.diem_danh_gia,blacklist:!!s.blacklist};
}

function _agingDemo(cns){
  const today=new Date(); const b={chua_den_han:0,b_0_30:0,b_31_60:0,b_61_90:0,b_90p:0};
  cns.forEach(x=>{const con=x.so_tien-(x.da_thanh_toan||0); if(con<=0)return;

async function _ttmGhi(id,dn,ngayTT){

    try{
      const r=await api(`/ncc/don-mua/${id}/thanh-toan`,{method:'POST',body:JSON.stringify({de_nghi_tt:dn,ngay_tt_tiep:ngayTT})});
      toast(r.da_tt_100?"✅ "+(x.so||'PO')+" đã thanh toán 100% — lưu vào Kiểm soát → Đơn hàng đã thanh toán 100%"
                       :"Đã ghi nhận — còn lại "+vnd(r.con_lai)+" chuyển sang Công nợ phải trả","ok");
    }catch(e){toast(e.detail||e.message,"err");return false;}
  }else{
    const p=(DEMO.don_mua||[]).find(d=>d.id===id); if(!p)return false;
    p.de_nghi_tt=dn; p.ngay_tt_tiep=ngayTT;
    p.tt_du=p.tong_tien>0&&dn>=p.tong_tien;
    p.ngay_tt_du=p.tt_du?new Date().toISOString().slice(0,10):null;
    DEMO.cong_no_ncc=DEMO.cong_no_ncc||[];
    let cn=DEMO.cong_no_ncc.find(c=>c.don_mua_id===id);
    if(p.tt_du){ if(cn){cn.da_thanh_toan=cn.so_tien;cn.trang_thai="DA_TRA";} }
    else{
      const homNay=new Date().toISOString().slice(0,10);
      if(!cn){DEMO.cong_no_ncc.push({id:Date.now(),don_mua_id:id,nha_cung_cap_id:p.nha_cung_cap_id,so_tien:p.tong_tien,da_thanh_toan:dn,han:ngayTT,ngay_tt:dn>0?homNay:null,trang_thai:dn>0?"TRA_MOT_PHAN":"CHUA_TRA"});}

    }
    toast(p.tt_du?"✅ Đã thanh toán 100% (demo) — xem Kiểm soát":"Đã ghi nhận (demo) — còn lại "+vnd(p.tong_tien-dn)+" ở Công nợ phải trả","ok");
  }
  viewNCC($("#main"));
  return true;
}

function _treHanDemo(){
  const today=new Date(); const sup=id=>{const s=DEMO.ncc.suppliers.find(x=>x.id===id);return s?s.ten:("NCC #"+id);};
  return (DEMO.don_mua||[]).filter(p=>p.trang_thai==="DA_DUYET"&&p.ngay_hen_giao).map(p=>{
      const moc=p.ngay_giao_thuc?new Date(p.ngay_giao_thuc):today; const tre=Math.floor((moc-new Date(p.ngay_hen_giao))/864e5);
      const chuaDu=p.trang_thai_nhan!=="DU"; return {p,tre,chuaDu};})
    .filter(o=>o.tre>0&&(o.chuaDu||o.p.ngay_giao_thuc))
    .map(o=>({so:o.p.so,ten_ncc:sup(o.p.nha_cung_cap_id),ngay_hen_giao:o.p.ngay_hen_giao,ngay_giao_thuc:o.p.ngay_giao_thuc||null,

    .sort((a,b)=>b.so_ngay_tre-a.so_ngay_tre);

function _kiemSoatDemo(){
  return (DEMO.ncc.suppliers||[]).map(s=>{

      return {ten:s.ten,han_muc:hm,du_no:du,ty_le:ty,vuot:hm>0&&du>hm,sap_vuot:hm>0&&ty>=80&&ty<=100};})

}

/* Combobox gõ-để-tìm (autocomplete) dùng lại được: input hiển thị + hidden lưu id */
function _cbxStrip(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d');}
/* Biến MỌI <select> thành ô GÕ-ĐỂ-TÌM. Giữ nguyên id/value/onchange của select gốc
   (select bị ẩn nhưng vẫn là nguồn dữ liệu), nên code cũ đọc .value / set innerHTML vẫn chạy. */
function _enhanceSelects(root){
  (root||document).querySelectorAll('select:not([data-cbx]):not([data-nocbx])').forEach(sel=>{
    if(sel.multiple)return;
    sel.setAttribute('data-cbx','1'); sel.style.display='none';
    const wrap=document.createElement('div'); wrap.className='cbx'; wrap.style.cssText='position:relative;width:100%';
    const txt=document.createElement('input'); txt.type='text'; txt.autocomplete='off'; txt.className='cbx-inp'; txt.style.width='100%';
    const first=sel.options[0];
    txt.placeholder=sel.getAttribute('data-ph')||((first&&first.value==='')?first.textContent.trim():'Gõ để tìm…');
    const dd=document.createElement('div'); dd.className='cbx-dd';
    dd.style.cssText='display:none;position:fixed;z-index:10050;background:var(--surface,#fff);border:1px solid var(--border,#e2e8f0);border-radius:8px;max-height:230px;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,.18)';
    sel.parentNode.insertBefore(wrap,sel); wrap.appendChild(txt); wrap.appendChild(dd); wrap.appendChild(sel);
    const opts=()=>Array.from(sel.options).map(o=>({v:o.value,l:o.textContent.trim()}));
    const syncText=()=>{const o=sel.options[sel.selectedIndex]; txt.value=(o&&o.value!=='')?o.textContent.trim():'';};
    const datViTri=()=>{           // position:fixed theo ô nhập — không bị panel overflow:hidden cắt
      const r=txt.getBoundingClientRect();
      dd.style.left=r.left+'px'; dd.style.width=r.width+'px';
      if(window.innerHeight-r.bottom<240&&r.top>260){dd.style.top='';dd.style.bottom=(window.innerHeight-r.top+2)+'px';}
      else{dd.style.bottom='';dd.style.top=(r.bottom+2)+'px';}
    };
    const render=q=>{
      const s=_cbxStrip((q||'').trim());
      const list=opts().filter(o=>_cbxStrip(o.l).includes(s)).slice(0,60);
      datViTri();
      if(!list.length){dd.innerHTML='<div style="padding:8px 10px;color:var(--muted)">Không có kết quả</div>';dd.style.display='block';return;}
      dd.innerHTML=list.map(o=>`<div data-v="${String(o.v).replace(/"/g,'&quot;')}" style="padding:8px 10px;cursor:pointer" onmouseenter="this.style.background='var(--surface)'" onmouseleave="this.style.background=''">${o.l||'—'}</div>`).join('');
      dd.style.display='block';
      Array.from(dd.children).forEach(ch=>{ch.onmousedown=e=>{e.preventDefault(); sel.value=ch.getAttribute('data-v'); syncText(); dd.style.display='none'; sel.dispatchEvent(new Event('change',{bubbles:true}));};});
    };
    txt.addEventListener('input',()=>render(txt.value));
    txt.addEventListener('focus',()=>render(''));
    txt.addEventListener('blur',()=>setTimeout(()=>{dd.style.display='none'; syncText();},160));
    new MutationObserver(()=>syncText()).observe(sel,{childList:true});
    syncText();
  });
}
function _initCbxObserver(){
  if(window._cbxInit)return; window._cbxInit=1;
  _enhanceSelects(document);
  new MutationObserver(()=>{ if(window._cbxT)return; window._cbxT=setTimeout(()=>{window._cbxT=null; _enhanceSelects(document);},30); })
    .observe(document.body,{childList:true,subtree:true});
  // danh sách thả dùng position:fixed → cuộn trang hoặc đổi cỡ cửa sổ thì đóng lại cho khỏi lệch chỗ
  const dongDd=()=>document.querySelectorAll('.cbx-dd').forEach(d=>{d.style.display='none';});
  document.addEventListener('scroll',e=>{ if(e.target&&e.target.closest&&e.target.closest('.cbx-dd'))return; dongDd(); },true);
  window.addEventListener('resize',dongDd);
}

async function ktBdGhi(){
  const st=Number(gv('bd_st')||0); if(!(st>0))return toast("Nhập số tiền (VNĐ) lớn hơn 0","err");
  const loai=gv('bd_loai'), quy=gv('bd_quy'), den=gv('bd_den');
  const tkThu=gv('bd_tk_thu'), tkChi=gv('bd_tk_chi');
  const ngay=gv('bd_ngay')||null, dh=gv('bd_dh')||'', dg=gv('bd_dg')||'';
  if(!quy)return toast("Chọn Sổ Quỹ (Vietcombank / BIDV / Đông Á / Tiền mặt)","err");
  if(loai==='CHUYEN'&&!den)return toast("Chuyển tiền — chọn sổ quỹ nhận tiền (Chuyển đến sổ quỹ)","err");
  if(loai==='CHUYEN'&&quy===den)return toast("Hai sổ quỹ chuyển phải khác nhau","err");
  const tkKt=(sel,id)=>{const o=document.querySelector(`#${sel} option[value="${id}"]`);return (o&&o.getAttribute('data-tk'))||null;};
  if(S.mode!=="live"){
    const seq=Date.now(); const ordS=(DEMO.don_hang||[]).find(o=>String(o.id)===String(dh));
    const push=(l,q,dgx,tk,i)=>(DEMO.ke_toan.phieu=DEMO.ke_toan.phieu||[]).unshift({id:seq+i,so:(l==='THU'?'PT':'PC')+'-demo-'+((seq+i)%100000),loai:l,quy_id:Number(q),so_tien:st,ngay:ngay||new Date().toISOString().slice(0,10),dien_giai:dgx,ma_ban:ordS?ordS.so:null,tk_doi_ung:tk||null,trang_thai:"DA_DUYET"});
    if(loai==='TIEN_VAO')push('THU',quy,dg||'Tiền vào sổ quỹ',tkThu,0);
    else if(loai==='TIEN_RA')push('CHI',quy,dg||'Tiền ra sổ quỹ',tkChi,0);
    else {push('CHI',quy,(dg?dg+' · ':'')+'Chuyển tiền đi',tkKt('bd_den',den),0);push('THU',den,(dg?dg+' · ':'')+'Nhận tiền chuyển đến',tkKt('bd_quy',quy),1);}
    toast("Đã ghi biến động (demo)","ok");ktRender();return;
  }
  const mk=(l,q,dgx,tk)=>({loai:l,quy_id:Number(q),so_tien:st,ngay,don_hang_id:dh?Number(dh):null,dien_giai:dgx,tk_doi_ung:tk||null,trinh_luon:true});
  try{
    if(loai==='TIEN_VAO')await api("/ke-toan/phieu",{method:'POST',body:JSON.stringify(mk('THU',quy,dg||'Tiền vào sổ quỹ',tkThu))});
    else if(loai==='TIEN_RA')await api("/ke-toan/phieu",{method:'POST',body:JSON.stringify(mk('CHI',quy,dg||'Tiền ra sổ quỹ',tkChi))});
    else{
      // chuyển giữa 2 sổ quỹ: định khoản chéo theo tk_ke_toan của sổ bên kia
      await api("/ke-toan/phieu",{method:'POST',body:JSON.stringify(mk('CHI',quy,(dg?dg+' — ':'')+'Chuyển tiền sang sổ quỹ khác',tkKt('bd_den',den)))});
      await api("/ke-toan/phieu",{method:'POST',body:JSON.stringify(mk('THU',den,(dg?dg+' — ':'')+'Nhận tiền chuyển từ sổ quỹ khác',tkKt('bd_quy',quy)))});
    }
    toast("✅ Đã tạo phiếu và trình duyệt — thống kê cập nhật sau khi phiếu được duyệt","ok");
    ktRender();
  }catch(e){toast(e.detail||e.message,"err");}
}
function _tkDemo(){
  const ps=(DEMO.ke_toan.phieu||[]).filter(p=>p.trang_thai==="DA_DUYET"
    &&(!S.tkF.tu||(p.ngay||'')>=S.tkF.tu)&&(!S.tkF.den||(p.ngay||'')<=S.tkF.den)&&(!S.tkF.quy_id||String(p.quy_id)===String(S.tkF.quy_id)));
  const thang={},loai={},quy={},mb={}; let tThu=0,tChi=0;
  const qn=id=>((DEMO.ke_toan.quy||[]).find(q=>q.id===id)||{}).ten||('Quỹ '+id);
  ps.forEach(p=>{const a=p.so_tien; const off=p.tk_doi_ung||(p.loai==="THU"?"131":"642"); const ky=(p.ngay||'').slice(0,7)||'—'; const m=p.ma_ban||'(không gắn)';
    [[thang,ky],[loai,off],[quy,qn(p.quy_id)],[mb,m]].forEach(([d,k])=>{const g=d[k]||(d[k]={thu:0,chi:0});g[p.loai==="THU"?"thu":"chi"]+=a;});
    if(p.loai==="THU")tThu+=a;else tChi+=a;});
  return {tong_thu:tThu,tong_chi:tChi,rong:tThu-tChi,so_phieu:ps.length,
    theo_thang:Object.entries(thang).sort().map(([ky,v])=>({ky,...v,rong:v.thu-v.chi})),
    theo_loai:Object.entries(loai).map(([tk,v])=>({tk,ten_tk:'',...v})).sort((a,b)=>(b.thu+b.chi)-(a.thu+a.chi)),
    theo_quy:Object.entries(quy).map(([quy,v])=>({quy,...v})),
    theo_ma_ban:Object.entries(mb).map(([ma_ban,v])=>({ma_ban,...v,rong:v.thu-v.chi})).sort((a,b)=>(b.thu+b.chi)-(a.thu+a.chi))};
}

const CAP_BADGE={"Điều hành":"b-tc","Quản lý":"b-info","Chuyên viên":"b-cho","Nhân viên":"b-ok"};
const LOAIKY_TEN={TUAN:"Tuần",THANG:"Tháng",QUY:"Quý",NAM:"Năm"};
function _xepBadge(x){return {A:"b-ok",B:"b-info",C:"b-cho",D:"b-tc"}[x]||"b-info";}
function _isoWeek(d){const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=t.getUTCDay()||7;t.setUTCDate(t.getUTCDate()+4-day);const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));return Math.ceil((((t-ys)/86400000)+1)/7);}
function _kyHienTai(loai){const d=new Date(),y=d.getFullYear();
  if(loai==="NAM")return String(y);
  if(loai==="QUY")return `${y}-Q${Math.floor(d.getMonth()/3)+1}`;
  if(loai==="TUAN")return `${y}-W${String(_isoWeek(d)).padStart(2,'0')}`;
  return `${y}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function _kpiTinh(chieu,mt,thuc,ts){
  if(thuc===null||thuc===''||isNaN(Number(thuc)))return {pct:null,diem:0};
  thuc=Number(thuc);let pct;
  if(mt===null||mt===undefined)pct=100;
  else{mt=Number(mt);
    if(chieu==="THAP")pct=mt===0?(thuc<=0?100:Math.max(0,100-thuc*25)):(thuc<=mt?100:mt/thuc*100);
    else pct=mt===0?100:thuc/mt*100;}
  return {pct:Math.round(Math.min(pct,200)*100)/100,diem:Math.round(Number(ts||0)*Math.min(pct,100)/100*100)/100};
}

async function nsMotaCV(host){
  if(!S.nsKpiTab)S.nsKpiTab="jd";
  const subs=[["jd","Mô tả công việc (JD)"],["danhgia","Đánh giá KPI"],["tongket","Tổng kết kết quả"]];
  host.innerHTML=`<div class="tabs" style="margin-bottom:14px">${subs.map(([k,l])=>`<button class="${S.nsKpiTab===k?'active':''}" onclick="nsKpiSub('${k}')">${l}</button>`).join('')}</div>
    ${S.mode!=="live"?`<div class="panel" style="margin-bottom:12px"><div class="panel-b" style="color:var(--muted);font-size:12.5px">Chế độ demo hiển thị 3 vị trí mẫu. Kết nối hệ thống (live) để xem & chỉnh đầy đủ 14 vị trí và lưu đánh giá.</div></div>`:''}
    <div id="kpiBody">Đang tải…</div>`;
  const h=$("#kpiBody");
  if(S.nsKpiTab==="jd")await nsJD(h);
  else if(S.nsKpiTab==="danhgia")await nsDanhGia(h);
  else await nsTongKet(h);
}
function nsKpiSub(k){S.nsKpiTab=k;S.nsJDSel=null;nsRender();}

/* --- JD --- */
async function nsJD(host){
  if(S.nsJDSel)return nsJDDetail(host,S.nsJDSel);
  let list;
  if(S.mode==="live"){ try{list=await api("/nhan-su/mo-ta-cv");}catch(e){host.innerHTML=`<div class="perm-denied">${e.detail||e.message}</div>`;return;} }
  else list=_demoJDList();
  const rows=list.map(j=>`<tr><td><b>${j.vai_tro}</b></td><td>${j.chuc_danh}</td>
    <td><span class="badge ${CAP_BADGE[j.cap_bac]||'b-info'}">${j.cap_bac||'—'}</span></td>
    <td>${ROLE_NAME[j.bao_cao_cho]||j.bao_cao_cho||'—'}</td>
    <td class="num">${j.so_kpi}</td>
    <td style="white-space:nowrap"><button class="btn-sm ghost" onclick="nsOpenJD('${j.vai_tro}')">Xem mô tả</button>
      <button class="btn-sm ghost" onclick="nsJDPdf('${j.vai_tro}')">🖨 PDF</button>
      <button class="btn-sm ghost" onclick="tdMoTin('${j.vai_tro}')">📢 Tin tuyển dụng</button>
      <button class="btn-sm ghost" onclick="hdldMo('${j.vai_tro}')">📄 HĐLĐ 1 năm</button></td></tr>`).join('');
  host.innerHTML=`<div class="panel"><div class="panel-h"><h3>Bảng mô tả công việc theo vị trí</h3></div>
    <div class="panel-b"><table><thead><tr><th>Mã VT</th><th>Chức danh</th><th>Cấp bậc</th><th>Báo cáo cho</th><th class="num">Số KPI</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`;
}
function nsOpenJD(vt){S.nsJDSel=vt;nsRender();}
function nsBackJD(){S.nsJDSel=null;nsRender();}

function tdCopy(){
  const j=S._tdJ,o=_tdOpt(),yc=j.yeu_cau||{};
  const hanVN=o.han?o.han.split('-').reverse().join('/'):'';
  const L=[];
  L.push(`📢 TIN TUYỂN DỤNG: ${j.chuc_danh.toUpperCase()}`);
  L.push(`${TD_CTY.ten} — "${TD_CTY.slogan}"`,'');
  L.push(`• Cấp bậc: ${j.cap_bac||'—'} | Số lượng: ${o.sl} | Loại hình: ${o.lh}`);
  L.push(`• Mức lương: ${o.luong}`);
  L.push(`• Nơi làm việc: ${o.noi}`);
  if(hanVN)L.push(`• Hạn nộp hồ sơ: ${hanVN}`);
  L.push('','🏢 GIỚI THIỆU CÔNG TY',TD_CTY.gioi_thieu);
  L.push('','📋 MÔ TẢ CÔNG VIỆC'); if(j.muc_dich)L.push(j.muc_dich);
  (j.trach_nhiem||[]).forEach(x=>L.push('- '+x));
  L.push('','✅ YÊU CẦU ỨNG VIÊN');
  if(yc.hoc_van)L.push('- Học vấn: '+yc.hoc_van);
  if(yc.kinh_nghiem)L.push('- Kinh nghiệm: '+yc.kinh_nghiem);
  if(yc.ky_nang&&yc.ky_nang.length)L.push('- Kỹ năng: '+yc.ky_nang.join('; '));
  if(yc.chung_chi)L.push('- Chứng chỉ: '+yc.chung_chi);
  L.push('','🎁 QUYỀN LỢI');
  _tdQuyenLoi(j).forEach(x=>L.push('- '+x));
  L.push('','📩 CÁCH THỨC ỨNG TUYỂN');
  L.push(`Gửi CV về: ${o.email} — Tiêu đề: [Ứng tuyển] ${j.chuc_danh} - Họ tên`);
  L.push(`Điện thoại: ${o.dt} · ${TD_CTY.dia_chi} · ${TD_CTY.website}`);
  const txt=L.join('\n');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast("Đã sao chép tin tuyển dụng — dán vào website/trang tuyển dụng","ok"))
      .catch(()=>{_tdCopyFallback(txt);});
  }else _tdCopyFallback(txt);
}
function _tdCopyFallback(txt){
  const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);
  ta.select();try{document.execCommand('copy');toast("Đã sao chép tin tuyển dụng","ok");}catch(e){toast("Không sao chép được — trình duyệt chặn","err");}
  ta.remove();
}

/* ===== Hợp đồng lao động xác định thời hạn 12 tháng (theo Điều 20, 21 BLLĐ 2019) ===== */
function _cong12Thang(iso){const p=(iso||'').split('-').map(Number);if(p.length!==3)return'';
  const d=new Date(p[0]+1,p[1]-1,p[2]-1);const z=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
function _ngayVN(iso){return iso?iso.split('-').reverse().join('/'):'…/…/…';}

function hdldChonNV(id){
  const n=(S._hdldNVs||[]).find(x=>x.id===Number(id)); if(!n)return;
  const set=(i,v)=>{const e=document.getElementById(i);if(e&&v!=null)e.value=v;};
  set('hl_ht',n.ho_ten); set('hl_luong',n.luong_co_ban||0);
  const e=document.getElementById('hl_luong_chu'); if(e)e.textContent=docSoVN(n.luong_co_ban||0);
  const pc=[(n.phu_cap_an?'Ăn trưa '+Number(n.phu_cap_an).toLocaleString('vi-VN')+' đ/tháng':''),
    (n.phu_cap_di_lai?'Đi lại '+Number(n.phu_cap_di_lai).toLocaleString('vi-VN')+' đ/tháng':''),
    (n.phu_cap_dien_thoai?'Điện thoại '+Number(n.phu_cap_dien_thoai).toLocaleString('vi-VN')+' đ/tháng':''),
    (n.phu_cap_trach_nhiem?'Trách nhiệm '+Number(n.phu_cap_trach_nhiem).toLocaleString('vi-VN')+' đ/tháng':'')].filter(Boolean).join('; ');
  set('hl_pc',pc);
}

function nsDgPreview(){
  let tong=0;
  document.querySelectorAll('[id^="dg_"]').forEach(el=>{ if(!/^dg_\d+$/.test(el.id))return;
    const mt=el.dataset.mt===''?null:Number(el.dataset.mt);
    const r=_kpiTinh(el.dataset.ch,mt,el.value,el.dataset.ts);
    const pre=document.getElementById('pre_'+el.id.slice(3));
    if(pre)pre.textContent=el.value===''?'—':(r.diem+' đ'+(r.pct!=null?` (${r.pct}%)`:''));
    tong+=r.diem;});
  tong=Math.round(tong*100)/100;
  const t=document.getElementById('dg_tong');if(t)t.textContent=tong;
  const xl=tong>=85?'A':tong>=70?'B':tong>=50?'C':'D';
  const x=document.getElementById('dg_xl');if(x)x.innerHTML=`<span class="badge ${_xepBadge(xl)}">Loại ${xl}</span>`;
}

function _svgLine(pts,labels,opt){
  opt=opt||{};const w=opt.w||580,h=opt.h||210,pad=36,ymax=opt.ymax||100,col=opt.color||'#0e7490';
  if(!pts||!pts.length)return '<div style="color:var(--muted);padding:18px 4px">Chưa đủ dữ liệu để vẽ biểu đồ (cần ≥ 1 kỳ).</div>';
  const iw=w-pad-14,ih=h-pad-18,x0=pad,y0=h-pad;
  const X=i=>x0+(pts.length<=1?iw/2:iw*i/(pts.length-1));
  const Y=v=>y0-ih*Math.max(0,Math.min(v,ymax))/ymax;
  let g='';
  for(let k=0;k<=4;k++){const yy=y0-ih*k/4;g+=`<line x1="${x0}" y1="${yy.toFixed(1)}" x2="${x0+iw}" y2="${yy.toFixed(1)}" stroke="#eef2f4"/><text x="${x0-6}" y="${(yy+3).toFixed(1)}" text-anchor="end" font-size="10" fill="#9fb0bb">${ymax*k/4}</text>`;}
  const poly=pts.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const dots=pts.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3.6" fill="${col}"/><text x="${X(i).toFixed(1)}" y="${(Y(v)-8).toFixed(1)}" text-anchor="middle" font-size="10" fill="#374151">${v}</text>`).join('');
  const xl=labels.map((l,i)=>`<text x="${X(i).toFixed(1)}" y="${h-pad+15}" text-anchor="middle" font-size="9.5" fill="#6b7280">${l}</text>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:${w}px;height:auto">${g}${pts.length>1?`<polyline points="${poly}" fill="none" stroke="${col}" stroke-width="2"/>`:''}${dots}${xl}</svg>`;
}

const WT_LOAI={NGHI_PHEP:["Nghỉ phép năm","b-info"],KHONG_PHEP:["Nghỉ không phép","b-tc"],NGHI_LE:["Nghỉ lễ (nguyên lương)","b-ok"],VIEC_RIENG_CO_LUONG:["Việc riêng có lương","b-info"],VIEC_RIENG_KHONG_LUONG:["Việc riêng không lương","b-cho"],NGHI_BU:["Nghỉ bù","b-cho"],OT_THUONG:["Tăng ca ngày thường ≥150%","b-info"],OT_CUOI_TUAN:["Tăng ca cuối tuần ≥200%","b-cho"],OT_LE:["Tăng ca lễ/Tết ≥300%","b-tc"]};
const WT_TT={CHO_DUYET:["Chờ duyệt","b-cho"],DA_DUYET:["Đã duyệt","b-ok"],TU_CHOI:["Từ chối","b-tc"]};
/* Lịch nghỉ lễ nhà nước (Đ112): lễ dương cố định + lễ âm lịch/liền kề chốt theo từng năm */
const WT_LE_CO_DINH=["01-01","04-30","05-01","09-02"];
const WT_LE_THEO_NAM={"2026":["2026-02-16","2026-02-17","2026-02-18","2026-02-19","2026-02-20","2026-04-26","2026-09-01"]};
function wtLoaiNgay(iso){ if(!iso)return null;
  if(WT_LE_CO_DINH.includes(iso.slice(5))||(WT_LE_THEO_NAM[iso.slice(0,4)]||[]).includes(iso))return "OT_LE";
  return new Date(iso+"T12:00:00").getDay()===0?"OT_CUOI_TUAN":"OT_THUONG";
}
/* Tính phần tăng ca từ khung Từ/Đến: trả {phan:[[ngày,giờ,loại]...],tong} hoặc null nếu sai */
function dkTinh(){
  const n1=gv('dk_ngay'), n2=gv('dk_den_ngay')||n1;
  const g1=Number(gv('dk_tu_gio')), g2=Number(gv('dk_den_gio'));
  const setv=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v;};
  const kq=document.getElementById('dk_kq');
  const loi=t=>{setv('dk_loai_tx','—');setv('dk_gio_tx','');if(kq)kq.innerHTML=`<span style="color:#d97706">⚠ ${t}</span>`;return null;};
  if(!n1)return loi("Chọn ngày bắt đầu");
  let phan=[];
  const chenh=Math.round((new Date(n2+"T12:00:00")-new Date(n1+"T12:00:00"))/86400000);
  if(chenh===0){ if(g2<=g1)return loi("Giờ Đến phải sau giờ Từ"); phan=[[n1,g2-g1]]; }
  else if(chenh===1){ phan=[[n1,24-g1]]; if(g2>0&&g2<24)phan.push([n2,g2]); }
  else return loi("Chỉ đăng ký trong ngày hoặc ca qua đêm (Đến ngày = ngày kế tiếp)");
  const tong=phan.reduce((s,p)=>s+p[1],0);
  if(!(tong>0&&tong<=16))return loi("Tổng giờ tăng ca phải trong khoảng 0–16h");
  phan.forEach(p=>p.push(wtLoaiNgay(p[0])));
  const nhanLoai=[...new Set(phan.map(p=>WT_LOAI[p[2]][0]))].join(' + ');
  setv('dk_loai_tx',nhanLoai); setv('dk_gio_tx',tong+' giờ');
  if(kq)kq.innerHTML='→ '+phan.map(p=>`${p[0]}: <b>${p[1]}h</b> ${WT_LOAI[p[2]][0]}`).join(' · ')
    +(tong>4?' <span style="color:#d97706">· ⚠ lưu ý trần 4h OT/ngày (Đ107)</span>':'');
  return {phan,tong};
}

function _wtTinh(nvs,rows,thang){

    if(ng(trs,'KHONG_PHEP')>=5)cb.push('Không phép ≥5 ngày/tháng — căn cứ sa thải (Đ125)');
    else if(ng(rs,'KHONG_PHEP')>=20)cb.push('Không phép ≥20 ngày/năm — căn cứ sa thải (Đ125)');

async function wtGhi(){
  const nv=Number(gv('wt_nv')||0); if(!nv)return toast("Chọn nhân viên","err");
  const loai=gv('wt_loai'), ngay=gv('wt_ngay'); if(!ngay)return toast("Chọn ngày","err");
  const laOT=loai.indexOf('OT_')===0;
  const body={nhan_vien_id:nv,ngay,loai,ghi_chu:gv('wt_gc')||null};
  if(laOT){body.so_gio=Number(gv('wt_gio')||0); if(!(body.so_gio>0))return toast("Nhập số giờ tăng ca","err");}
  else{body.den_ngay=gv('wt_den')||null; body.so_ngay=Number(gv('wt_muc')||1);}
  if(S.mode!=="live"){
    const rows=_wtDemo(); const den=(!laOT&&body.den_ngay)?body.den_ngay:ngay;
    if(den<ngay)return toast("Đến ngày phải sau Từ ngày","err");
    const d0=new Date(ngay+"T12:00:00"), d1=new Date(den+"T12:00:00"); let n=0;
    for(let dt=new Date(d0);dt<=d1;dt.setDate(dt.getDate()+1)){
      if(!laOT&&d1>d0&&dt.getDay()===0)continue;
      const iso=dt.toISOString().slice(0,10);
      const cu=rows.find(r=>r.nhan_vien_id===nv&&r.ngay===iso&&r.loai===loai);
      if(cu){cu.so_gio=laOT?body.so_gio:0;cu.so_ngay=laOT?0:body.so_ngay;cu.ghi_chu=body.ghi_chu;}
      else rows.push({id:Date.now()+n,nhan_vien_id:nv,ngay:iso,loai,so_gio:laOT?body.so_gio:0,so_ngay:laOT?0:body.so_ngay,ghi_chu:body.ghi_chu});
      n++;
    }
    toast("Đã ghi nhận (demo)","ok"); viewWorkingTime($("#main")); return;
  }
  try{
    const r=await api("/nhan-su/working-time",{method:'POST',body:JSON.stringify(body)});
    toast(`✅ Đã ghi ${r.them+r.cap_nhat} dòng${r.cap_nhat?` (cập nhật ${r.cap_nhat})`:''}`,"ok");
    if((r.canh_bao||[]).length)_ktModal("⚠️ Cảnh báo Bộ luật Lao động 2019",
      `<ul style="padding-left:18px;line-height:1.9">${r.canh_bao.map(c=>`<li style="color:#dc2626">${c}</li>`).join('')}</ul>
       <div class="note" style="color:var(--muted)">Hệ thống vẫn ghi nhận số liệu — anh cân nhắc điều chỉnh kế hoạch làm việc để tuân thủ luật.</div>`);
    viewWorkingTime($("#main"));
  }catch(e){toast(e.detail||e.message,"err");}
}
async function wtXoa(id){

  if(S.mode==="live"){try{await api("/nhan-su/working-time/"+id,{method:'DELETE'});}catch(e){return toast(e.detail||e.message,"err");}}

}

  const canOp=can("nhan_su","THAO_TAC");
  if(S.mode!=="live"&&!DEMO.ns_hoso)DEMO.ns_hoso=_nsDemoHoSo();
  const ds = S.mode==="live" ? await api("/nhan-su/ho-so") : DEMO.ns_hoso;
  const rows=ds.map(x=>`<tr><td><b>${x.ma||x.id}</b></td><td>${x.ho_ten}</td><td>${x.chuc_danh||''}</td>
    <td class="num">${vnd(x.luong_co_ban)}</td><td class="num">${vnd(x.luong_dong_bh||x.luong_co_ban)}</td>
    <td class="num">${vnd((x.phu_cap_an||0)+(x.phu_cap_di_lai||0)+(x.phu_cap_dien_thoai||0)+(x.phu_cap_trach_nhiem||0))}</td>
    <td class="num">${x.so_phu_thuoc||0}</td><td>${x.email||'<span style="color:#dc2626">— thiếu —</span>'}</td>
    ${canOp?`<td style="white-space:nowrap"><button class="btn-sm ghost" onclick='nsSuaHoSo(${JSON.stringify(x).replace(/'/g,"&#39;")})'>Sửa</button>${(S.role==='CEO'||S.role==='ADMIN')?`<button class="btn-sm ghost" onclick="nsTaoTK(${x.id})">🔑 Tạo tài khoản</button>`:''}${laQTV()?` <button class="btn-sm ghost" style="color:var(--red)" title="Xóa nhân viên" onclick="nsXoaNV(${x.id},'${String(x.ho_ten||'').replace(/'/g,'')}')">🗑</button>`:''}</td>`:'<td></td>'}</tr>`).join('');
  host.innerHTML=`<div class="note" style="padding:0 0 10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span style="flex:1">Khai báo lương cơ bản, lương đóng BH, phụ cấp, số người phụ thuộc (giảm trừ thuế), tài khoản & <b>email</b> nhận phiếu lương cho từng nhân viên.</span>
    ${can("nhan_su","DUYET")?'<button class="btn-sm ghost" onclick="nsThamSo()">⚖️ Tham số lương theo luật</button>':''}</div>
    <div class="panel"><div class="panel-h"><h3>Hồ sơ lương nhân viên</h3><div class="spacer"></div>
      <button class="btn-sm ghost" onclick="nsHoSoInPdf()">🖨 In PDF</button>
      <button class="btn-sm ghost" style="margin-left:6px" onclick="nsHoSoXuatExcel()">⬇ Xuất Excel</button>
      ${canOp?'<button class="btn-sm ghost" style="margin-left:6px" onclick="nsHoSoMoNhap()">⬆ Nhập từ Excel</button>':''}
      ${canOp?'<button class="btn-sm" style="margin-left:6px" onclick="nsMoThemNV()">+ Thêm nhân viên</button>':''}</div><div class="panel-b"><table>
    <thead><tr><th>Mã</th><th>Họ tên</th><th>Chức danh</th><th class="num">Lương CB</th><th class="num">Lương đóng BH</th><th class="num">Phụ cấp</th><th class="num">Phụ thuộc</th><th>Email</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan="9" class="empty">Chưa có nhân viên — bấm "+ Thêm nhân viên".</td></tr>'}</tbody></table></div></div>`;
}
async function nsHoSoInPdf(){
  let ds; try{ ds = S.mode==="live" ? await api("/nhan-su/ho-so") : (DEMO.ns_hoso||_nsDemoHoSo()); }
  catch(e){return toast(e.detail||e.message,"err");}
  const f=n=>new Intl.NumberFormat('vi-VN').format(Math.round(n||0));
  const pc=x=>(x.phu_cap_an||0)+(x.phu_cap_di_lai||0)+(x.phu_cap_dien_thoai||0)+(x.phu_cap_trach_nhiem||0);
  const rows=ds.map((x,i)=>`<tr><td>${i+1}</td><td>${x.ma||x.id}</td><td class="l">${x.ho_ten}</td><td class="l">${x.chuc_danh||''}</td>
    <td class="r">${f(x.luong_co_ban)}</td><td class="r">${f(x.luong_dong_bh||x.luong_co_ban)}</td><td class="r">${f(pc(x))}</td>
    <td>${x.so_phu_thuoc||0}</td><td class="l">${(x.so_tai_khoan||'')+(x.ngan_hang?' — '+x.ngan_hang:'')}</td></tr>`).join('');
  const html=`<!doctype html><html lang="vi"><head><meta charset="utf-8"><title>Hồ sơ lương nhân viên</title>
    <style>body{font-family:Arial,Helvetica,sans-serif;font-size:12px;margin:26px;color:#111}
    h1{font-size:18px;color:#0e7490;margin:0 0 2px}.sub{color:#555;font-size:12px}
    table{border-collapse:collapse;width:100%;margin-top:12px}th,td{border:1px solid #999;padding:5px 7px;text-align:center}
    th{background:#e8f1f4}td.r{text-align:right}td.l{text-align:left}
    @media print{button{display:none}}</style></head><body>
    <h1>HỒ SƠ LƯƠNG NHÂN VIÊN</h1>
    <div class="sub">CÔNG TY TNHH GIẢI PHÁP KỸ THUẬT SÓNG VIỆT — Ngày lập: ${new Date().toLocaleDateString('vi-VN')} · ${ds.length} nhân viên</div>
    <table><thead><tr><th>STT</th><th>Mã NV</th><th>Họ tên</th><th>Chức danh</th><th>Lương cơ bản</th><th>Lương đóng BH</th><th>Tổng phụ cấp</th><th>Phụ thuộc</th><th>Tài khoản ngân hàng</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="9">Chưa có nhân viên</td></tr>'}</tbody></table>
    <button onclick="window.print()" style="margin-top:16px;padding:8px 18px">🖨 In / Lưu PDF</button>
    <scr`+`ipt>setTimeout(()=>window.print(),400)<\/scr`+`ipt></body></html>`;
  const w=window.open('','_blank');
  if(!w)return toast("Trình duyệt chặn cửa sổ mới — cho phép popup rồi bấm lại","err");
  w.document.write(html); w.document.close();
}
async function nsHoSoXuatExcel(){
  if(S.mode!=="live"){
    const ds=DEMO.ns_hoso||_nsDemoHoSo();
    const pc=x=>(x.phu_cap_an||0)+(x.phu_cap_di_lai||0)+(x.phu_cap_dien_thoai||0)+(x.phu_cap_trach_nhiem||0);
    const rows=[["STT","Mã NV","Họ tên","Chức danh","Lương cơ bản","Lương đóng BH","Tổng phụ cấp","Phụ thuộc","Email","Số tài khoản","Ngân hàng"],
      ...ds.map((x,i)=>[i+1,x.ma||x.id,x.ho_ten,x.chuc_danh||'',x.luong_co_ban||0,x.luong_dong_bh||x.luong_co_ban||0,pc(x),x.so_phu_thuoc||0,x.email||'',x.so_tai_khoan||'',x.ngan_hang||''])];
    const csv='\ufeff'+rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
    const b=new Blob([csv],{type:'text/csv;charset=utf-8'}),u=URL.createObjectURL(b),a=document.createElement('a');
    a.href=u;a.download='ho-so-luong.csv';a.click();URL.revokeObjectURL(u);toast("Đã xuất CSV (demo)","ok");return;
  }
  try{
    const hd={}; if(S.token)hd['Authorization']='Bearer '+S.token;
    const r=await fetch(S.api+"/nhan-su/ho-so-xuat-excel",{headers:hd});
    if(!r.ok){toast("Không xuất được Excel","err");return;}
    const blob=await r.blob(),u=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=u;a.download='ho-so-luong.xlsx';document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(u),4000);toast("Đã xuất Excel","ok");
  }catch(e){toast(e.message,"err");}
}
function nsHoSoMoNhap(){
  _ktModal("⬆ Nhập hồ sơ lương từ Excel",`
    <div class="note" style="margin-bottom:10px">Cách dễ nhất: bấm <b>⬇ Xuất Excel</b> để lấy file mẫu, sửa số liệu trong Excel rồi nạp lại đây.
    Hệ thống khớp theo <b>Mã NV</b> (rồi đến <b>Họ tên</b>): trùng → cập nhật các cột có trong file; chưa có → tạo nhân viên mới.
    File tự tạo cũng được, miễn có dòng tiêu đề cột (Mã NV, Họ tên, Lương cơ bản, Lương đóng BH, PC ăn, PC đi lại, PC điện thoại, PC trách nhiệm, Phụ thuộc, Email, Số tài khoản, Ngân hàng...).</div>
    <div class="f"><label>File Excel (.xlsx)</label><input type="file" id="hs_nhap_file" accept=".xlsx,.xlsm"></div>
    <button class="btn-sm" id="hs_nhap_btn" style="margin-top:12px" onclick="nsHoSoNhapExcel()">⬆ Nhập vào hồ sơ lương</button>`);
}
async function nsHoSoNhapExcel(){
  if(S.mode!=="live"){toast("Nhập Excel chạy ở bản kết nối backend","err");return;}
  const inp=document.getElementById('hs_nhap_file'), f=inp&&inp.files[0];
  if(!f){toast("Chọn file Excel (.xlsx)","err");return;}
  const btn=document.getElementById('hs_nhap_btn');
  if(btn){btn.disabled=true;btn.textContent="⏳ Đang nhập…";}
  try{
    const fd=new FormData(); fd.append('file',f);
    const r=await apiUpload("/nhan-su/ho-so-nhap-excel",fd);
    document.getElementById('ktModal')?.remove();
    toast(`✅ Nhập xong — cập nhật ${r.cap_nhat}, tạo mới ${r.tao_moi}, không đổi/bỏ qua ${r.bo_qua}`,"ok");
    if((r.chi_tiet||[]).length)
      _ktModal("Kết quả nhập hồ sơ lương",`<table><thead><tr><th>Nhân viên</th><th>Kết quả</th></tr></thead>
        <tbody>${r.chi_tiet.map(x=>`<tr><td>${x.ten}</td><td>${x.kq}</td></tr>`).join('')}</tbody></table>`);
    nsRender();
  }catch(e){toast(e.detail||e.message,"err");}
  finally{if(btn){btn.disabled=false;btn.textContent="⬆ Nhập vào hồ sơ lương";}}
}

async function nsTaoNV(){
  const ht=gv('nv_ht'),ma=gv('nv_ma'),cd=gv('nv_cd'),email=gv('nv_email');
  if(!ht)return toast("Họ tên là bắt buộc","err");
  if(email&&!email.includes('@'))return toast("Email không hợp lệ","err");
  const body={ho_ten:ht,ma:ma||null,chuc_danh:cd||null,
    luong_co_ban:Number(gv('nv_lcb'))||0,luong_dong_bh:Number(gv('nv_ldbh'))||0,
    so_phu_thuoc:Number(gv('nv_pt'))||0,email:email||null,
    so_tai_khoan:gv('nv_stk')||null,ngan_hang:gv('nv_nh')||null};
  if(S.mode==="live"){
    try{await api("/nhan-su/nhan-vien",{method:'POST',body:JSON.stringify(body)});}
    catch(e){return toast(e.detail||e.message,"err");}
  }else{
    if(!DEMO.ns_hoso)DEMO.ns_hoso=_nsDemoHoSo();
    const id=Math.max(0,...DEMO.ns_hoso.map(x=>x.id))+1;
    DEMO.ns_hoso.push({id,ma:ma||("NV"+String(id).padStart(3,'0')),ho_ten:ht,chuc_danh:cd||'',
      luong_co_ban:body.luong_co_ban,luong_dong_bh:body.luong_dong_bh,so_phu_thuoc:body.so_phu_thuoc,
      phu_cap_an:0,phu_cap_di_lai:0,phu_cap_dien_thoai:0,phu_cap_trach_nhiem:0,
      email:email||'',so_tai_khoan:gv('nv_stk')||'',ngan_hang:gv('nv_nh')||'',tk_chi_phi:'642'});
  }
  document.getElementById('ktModal')?.remove();
  toast("Đã thêm nhân viên "+ht+(S.mode==="demo"?" (demo)":"")+" — sẽ có trong kỳ lương tạo mới","ok");
  nsRender();
}
async function nsXoaNV(id,ten){
  if(!confirm("Xóa nhân viên \""+ten+"\"?\n\nChỉ xóa được nhân viên thêm nhầm CHƯA có bảng lương/chấm công. Nhân viên đã có dữ liệu lương nên chuyển trạng thái NGHỈ VIỆC thay vì xóa. Không thể hoàn tác."))return;
  if(S.mode==="live"){
    try{await api("/nhan-su/nhan-vien/"+id,{method:'DELETE'});}
    catch(e){return toast(e.detail||e.message,"err");}
  }else{
    const i=(DEMO.ns_hoso||[]).findIndex(x=>x.id===id); if(i>=0)DEMO.ns_hoso.splice(i,1);
  }
  toast("Đã xóa nhân viên "+ten+(S.mode==="demo"?" (demo)":""),"ok");
  nsRender();
}

    <div class="formrow">${f('h_email','Email nhận phiếu lương',x.email||'','email')}${f('h_stk','Số tài khoản',x.so_tai_khoan||'','text')}${f('h_nh','Ngân hàng',x.ngan_hang||'','text')}<div class="f"><label>TK chi phí</label><select id="h_tk"><option ${x.tk_chi_phi==='642'?'selected':''}>642</option><option ${x.tk_chi_phi==='622'?'selected':''}>622</option><option ${x.tk_chi_phi==='627'?'selected':''}>627</option></select></div></div>
    <div style="text-align:right;margin-top:8px"><button class="btn-sm" onclick="nsLuuHoSo(${x.id})">Lưu hồ sơ</button></div>`);

async function nsLuuHoSo(id){
  const ht=gv('h_ht');
  if(!ht)return toast("Họ tên không được để trống","err");
  const body={ho_ten:ht,ma:gv('h_ma')||null,chuc_danh:gv('h_cd')||null,
    luong_co_ban:Number(gv('h_lcb')||0),luong_dong_bh:Number(gv('h_ldbh')||0),so_phu_thuoc:Number(gv('h_pt')||0),
    phu_cap_an:Number(gv('h_pan')||0),phu_cap_di_lai:Number(gv('h_pdl')||0),phu_cap_dien_thoai:Number(gv('h_pdt')||0),phu_cap_trach_nhiem:Number(gv('h_ptn')||0),
    email:gv('h_email')||null,so_tai_khoan:gv('h_stk')||null,ngan_hang:gv('h_nh')||null,tk_chi_phi:gv('h_tk')||'642'};
  if(S.mode==="live"){ try{await api(`/nhan-su/nhan-vien/${id}/ho-so`,{method:'PUT',body:JSON.stringify(body)});toast("Đã lưu hồ sơ","ok");}catch(e){toast(e.detail||e.message,"err");return;} }
  else{
    const nv=(DEMO.ns_hoso||[]).find(x=>x.id===id);
    if(nv)Object.assign(nv,{ho_ten:ht,ma:gv('h_ma')||nv.ma,chuc_danh:gv('h_cd')||nv.chuc_danh,
      luong_co_ban:body.luong_co_ban,luong_dong_bh:body.luong_dong_bh,so_phu_thuoc:body.so_phu_thuoc,
      phu_cap_an:body.phu_cap_an,phu_cap_di_lai:body.phu_cap_di_lai,phu_cap_dien_thoai:body.phu_cap_dien_thoai,
      phu_cap_trach_nhiem:body.phu_cap_trach_nhiem,email:body.email||'',so_tai_khoan:body.so_tai_khoan||'',
      ngan_hang:body.ngan_hang||'',tk_chi_phi:body.tk_chi_phi});
    toast("Đã lưu (demo)","ok");
  }
  const md=document.getElementById('ktModal'); if(md)md.remove(); nsRender();
}

/* --- Tạo tài khoản đăng nhập cho nhân viên (CEO/Admin) --- */
async function nsTaoTK(nvId){
  const ds=S.mode==="live"?await api("/nhan-su/ho-so").catch(()=>[]):(DEMO.ns_hoso||[]);
  const nv=ds.find(x=>x.id===nvId); if(!nv)return toast("Không tìm thấy nhân viên","err");
  let roles;
  if(S.mode==="live"){ try{roles=await api("/cau-hinh/vai-tro");}catch(e){return toast("Chỉ CEO/Admin tạo được tài khoản: "+(e.detail||e.message),"err");} }
  else roles=Object.entries(ROLE_NAME).map(([ma,ten])=>({ma,ten}));
  // đoán vai trò từ chức danh
  const doan=(Object.entries(ROLE_NAME).find(([,ten])=>ten===(nv.chuc_danh||''))||[])[0]||'NV_KD';
  S._nsTkNv=nv;
  _ktModal("🔑 Tạo tài khoản đăng nhập — "+nv.ho_ten,`
    <div class="note" style="margin-bottom:10px">Tài khoản dùng để đăng nhập hệ thống SVWS; quyền theo vai trò được chọn. Có thể quản lý lại ở phân hệ <b>Cấu hình</b>.</div>
    <label>Email đăng nhập</label><input id="tk_email" type="email" value="${(nv.email||'').replace(/"/g,'&quot;')}" placeholder="ten@svws.vn">
    <label>Mật khẩu ban đầu (tối thiểu 6 ký tự)</label><input id="tk_mk" type="text" placeholder="Người dùng nên đổi sau khi nhận">
    <label>Vai trò (đoán từ chức danh — sửa được)</label>
    <select id="tk_vt" data-nocbx>${roles.map(r=>`<option value="${r.ma}" ${r.ma===doan?'selected':''}>${r.ten} (${r.ma})</option>`).join('')}</select>
    <button class="btn-sm" style="margin-top:14px" onclick="nsTaoTKLuu()">Tạo tài khoản</button>`);
}
async function nsTaoTKLuu(){
  const email=(gv('tk_email')||'').toLowerCase(), mk=gv('tk_mk'), vt=gv('tk_vt');
  if(!email.includes('@'))return toast("Email không hợp lệ","err");
  if((mk||'').length<6)return toast("Mật khẩu tối thiểu 6 ký tự","err");
  if(S.mode==="live"){
    try{await api("/cau-hinh/nguoi-dung",{method:'POST',body:JSON.stringify({email,mat_khau:mk,vai_tro:vt})});}
    catch(e){return toast(e.detail||e.message,"err");}
  }else{
    if(typeof DEMO_USERS!=='undefined'){
      if(DEMO_USERS.some(u=>u.email===email))return toast("Email đã tồn tại","err");
      DEMO_USERS.push({id:Math.max(...DEMO_USERS.map(u=>u.id))+1,email,vai_tro:vt,ten_vai_tro:ROLE_NAME[vt]||vt,trang_thai:"HOAT_DONG"});
    }
  }
  document.getElementById('ktModal')?.remove();
  toast("Đã tạo tài khoản "+email+" ("+(ROLE_NAME[vt]||vt)+")"+(S.mode==="demo"?" (demo)":""),"ok");

function nsViDuTinh(){
  const kq=document.getElementById('vd_kq'); if(!kq)return;
  const num=id=>Number(gv(id)||0);
  const L=num('vd_luong'), PT=num('vd_pt'), OTH=num('vd_ot');
  const _r0=n=>Math.round(n), pctv=v=>(v*100).toFixed(v*100%1?1:0)+'%';
  const t={xhnv:num('t_bhxhnv')/100,ytnv:num('t_bhytnv')/100,tnnv:num('t_bhtnnv')/100,
    xhdn:num('t_bhxhdn')/100,ytdn:num('t_bhytdn')/100,tndn:num('t_bhtndn')/100,
    tranXH:num('t_tranxhyt'),tranTN:num('t_trantn'),gtbt:num('t_gtbt'),gtpt:num('t_gtpt'),
    an:num('t_an'),otth:num('t_otth')||1.5,otct:num('t_otct')||2,otle:num('t_otle')||3,
    lcs:num('t_lcs'),lttv:num('t_lttv')};
  let bac=(S._tsVd&&S._tsVd.bac_thue)||[[5000000,0.05],[10000000,0.10],[18000000,0.15],[32000000,0.20],[52000000,0.25],[80000000,0.30],[null,0.35]];
  const raw=gv('t_bac'); if(raw){try{const b=JSON.parse(raw);if(Array.isArray(b)&&b.length)bac=b;}catch(_){}}
  if(!(L>0)){kq.innerHTML='<div class="note" style="color:var(--muted);padding:6px 0">Nhập mức lương để xem cách tính.</div>';return;}
  const canXH=Math.min(L,t.tranXH||L), canTN=Math.min(L,t.tranTN||L);
  const nvXH=_r0(canXH*t.xhnv), nvYT=_r0(canXH*t.ytnv), nvTN=_r0(canTN*t.tnnv), nvTong=nvXH+nvYT+nvTN;
  const dnTong=_r0(canXH*(t.xhdn+t.ytdn))+_r0(canTN*t.tndn);
  const giamTru=t.gtbt+PT*t.gtpt;
  const tntt=Math.max(0,L-nvTong-giamTru);
  let thue=0,prev=0;
  for(const b of bac){const tran=b[0],suat=b[1];const upper=(tran===null)?tntt:Math.min(tntt,tran);
    if(upper>prev)thue+=(upper-prev)*suat; if(tran!==null)prev=tran; if(tran!==null&&tntt<=tran)break;}
  thue=_r0(thue);
  const ot=_r0(L/26/8*t.otth*OTH);
  const thucNhan=L+t.an+ot-nvTong-thue;
  const vuotXH=t.tranXH&&L>t.tranXH;
  kq.innerHTML=`<div style="font-size:12.5px;line-height:1.75;background:rgba(14,116,144,.06);border:1px solid rgba(14,116,144,.25);border-radius:8px;padding:10px 12px">
    Lương <b>${vnd(L)}</b>/tháng (mức đóng BH bằng lương), cơm trưa <b>${vnd(t.an)}</b>, <b>${PT} người phụ thuộc</b>, tăng ca <b>${OTH} giờ ngày thường</b>, công chuẩn 26:<br>
    1️⃣ <b>NV đóng bảo hiểm</b> (trừ vào lương): BHXH ${pctv(t.xhnv)} = ${vnd(nvXH)} · BHYT ${pctv(t.ytnv)} = ${vnd(nvYT)} · BHTN ${pctv(t.tnnv)} = ${vnd(nvTN)} → cộng <b>${vnd(nvTong)}</b><br>
    2️⃣ <b>Doanh nghiệp đóng thêm</b> (chi phí DN, không trừ lương NV): ${pctv(t.xhdn+t.ytdn+t.tndn)} = <b>${vnd(dnTong)}</b><br>
    3️⃣ <b>Trần đóng</b>: ${vuotXH?`lương VƯỢT trần ${vnd(t.tranXH)} → BHXH/BHYT chỉ tính trên mức trần`:`lương dưới trần ${vnd(t.tranXH)} nên đóng trên cả ${vnd(L)}`} (BHTN trần ${vnd(t.tranTN)})<br>
    4️⃣ <b>Miễn thuế cơm trưa</b>: ${vnd(t.an)} không tính vào thu nhập chịu thuế<br>
    5️⃣ <b>Giảm trừ gia cảnh</b>: bản thân ${vnd(t.gtbt)} + ${PT} × ${vnd(t.gtpt)} = <b>${vnd(giamTru)}</b><br>
    6️⃣ <b>Thu nhập tính thuế</b> = ${vnd(L)} − ${vnd(nvTong)} (BH) − ${vnd(giamTru)} (giảm trừ) = <b>${vnd(tntt)}</b> → thuế TNCN lũy tiến = <b>${vnd(thue)}</b><br>
    7️⃣ <b>Tăng ca</b>: lương giờ = ${vnd(L)} / 26 công / 8h ≈ ${vnd(L/26/8)} × hệ số ${t.otth} × ${OTH}h = <b>${vnd(ot)}</b> (cuối tuần ×${t.otct}, lễ/Tết ×${t.otle})<br>
    ✅ <b>Thực nhận</b> ≈ ${vnd(L)} + ${vnd(t.an)} (cơm) + ${vnd(ot)} (OT) − ${vnd(nvTong)} (BH) − ${vnd(thue)} (thuế) = <b style="color:#0e7490">${vnd(thucNhan)}</b><br>
    <span style="color:var(--muted)">Lương cơ sở ${vnd(t.lcs)} dùng tính trần BHXH (20 lần) và các chế độ BHXH; lương tối thiểu vùng ${vnd(t.lttv)} là mức sàn trả lương + căn cứ trần BHTN (20 lần). Sửa bất kỳ tham số nào phía trên — ví dụ tính lại ngay.</span></div>`;
}

function _donTri(s){return (s||'').toUpperCase().includes('01-1:2018');}
function _giaTriMau(s,cot){s=(s||'').toUpperCase();cot=(cot||'B').toUpperCase();
  if(s.includes('01-1:2018'))return VAL_0112018.map(x=>Object.assign({},x));
  let t=null;
  if(s.includes('13-MT'))t=VAL_13MT;
  else if(s.includes('QCVN 40:2025'))t=VAL_40_2025;
  else if(s.includes('QCVN 40:2011'))t=VAL_40_2011;
  else if(s.includes('QCVN 19:2024'))t=VAL_19_2024;
  if(!t||!t[cot])return null;
  return t[cot].map(x=>Object.assign({},x));}
function _coBangGiaTri(s){s=(s||'').toUpperCase();return s.includes('13-MT')||s.includes('QCVN 40:2011')||s.includes('QCVN 40:2025')||s.includes('QCVN 19:2024')||s.includes('01-1:2018');}
function _canhBaoNap(s){s=(s||'').toUpperCase();
  if(s.includes('01-1:2018'))return "\nLưu ý QCVN 01-1:2018/BYT (NƯỚC CẤP — nước sạch sinh hoạt, đạt mức ăn uống; thay QCVN 01:2009 & 02:2009): giá trị là GIỚI HẠN TỐI ĐA đơn trị, không có cột A/B/C. pH (6,0-8,5), Clo dư (0,2-1,0), Mùi-vị là khoảng/định tính nên để trống số. Đây là chất lượng MỤC TIÊU của nước sau xử lý. Đã nạp Nhóm A + vô cơ Nhóm B; nhóm hữu cơ/HCBVTV/phóng xạ (TT 37-99) chưa nạp.";
  if(s.includes('QCVN 19:2024'))return "\nLưu ý QCVN 19:2024: giá trị theo loại thiết bị đã chọn, CÓ hiệu chỉnh ôxy tham chiếu (O₂ref ghi ở cột Ghi chú) — giá trị đo phải quy về mức O₂ref đó. Bụi & Dioxin (Bảng 2 thể hạt) chưa có giá trị, cần đối chiếu công báo.";
  if(s.includes('QCVN 40:2025'))return "\nLưu ý QCVN 40:2025: đã bỏ Kq/Kf — giá trị là giới hạn trực tiếp. BOD/COD/TSS lấy theo F≤2.000 m³/ngày; nếu dự án >2.000 m³/ngày, sửa lại 3 dòng này (BOD≤30/50/60, COD≤60/70/90, TSS≤30/60/80).";
  return "\nGiá trị nạp là C (cơ sở). Giới hạn thực Cmax = C×Kq×Kf tùy nguồn tiếp nhận & lưu lượng (trừ pH, nhiệt độ, màu). Hãy đối chiếu công báo.";}
function _bar(pct,color){pct=Math.max(0,Math.min(100,pct||0));return `<div style="background:var(--line);border-radius:6px;height:8px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${color||'#0e7490'}"></div></div>`;}

/* Số báo giá bắt đầu bằng DA/DV -> dùng làm mã dự án */
async function _daBaoGiaDaDv(){
  let so=[];
  if(S.mode==="live"){
    try{const a=await api("/ban-hang/bao-gia-form");
      so.push(...a.filter(g=>!(g.noi_dung&&g.noi_dung.loai==='HOP_DONG')).map(g=>g.so||(g.noi_dung&&g.noi_dung.so)).filter(Boolean));}catch(_){}
    try{const b=await api("/ban-hang/bao-gia"); so.push(...b.map(x=>x.so).filter(Boolean));}catch(_){}
  }else{
    so.push(...(DEMO.bgf||[]).filter(g=>!(g.noi_dung&&g.noi_dung.loai==='HOP_DONG')).map(g=>g.so).filter(Boolean));
    so.push(...(DEMO.bao_gia||[]).map(b=>b.so).filter(Boolean));
  }
  return [...new Set(so)].filter(s=>/^(DA|DV)/i.test(String(s)));
}
function daTuBaoGia(so){
  if(!so)return;
  if(!/^(DA|DV)/i.test(so))return toast("Số báo giá phải bắt đầu bằng DA hoặc DV","err");
  const e=document.getElementById('da_ma'); if(e)e.value=so;
}
async function daTao(){
  const body={ma:gv('da_ma')||null,ten:gv('da_ten')};
  if(!body.ten){toast("Nhập tên dự án","err");return;}
  const bgChon=gv('da_bg');
  if(bgChon&&body.ma!==bgChon)body.ma=bgChon;   // đã gắn báo giá thì mã theo đúng số báo giá
  if(S.mode!=="live"){toast("Đã tạo (demo)","ok");return;}
  try{const d=await api("/du-an",{method:'POST',body:JSON.stringify(body)});toast("Đã tạo dự án","ok");daOpen(d.id);}catch(e){toast(e.detail||e.message,"err");}
}

async function daNapChiTieu(){

    else { const mau=_chiTieuMau(s,loai); if(!mau){toast("Chưa có danh mục mẫu cho tiêu chuẩn này — anh nhập thủ công","err");return;} danh_sach=mau; kemGT=false; } }

  const canhBao = nganh ? _canhBaoNganh(nganh) : (kemGT ? _canhBaoNap(s) : "\nGiá trị giới hạn để trống để anh nhập theo cột áp dụng.");

  if(S.mode!=="live"){toast(`Đã nạp ${danh_sach.length} chỉ tiêu (demo)`,"ok");return;}
  try{

    const r=await api(`/du-an/${S.daId}/chi-tieu/nap-mau`,{method:'POST',body:JSON.stringify({danh_sach})});

}

async function daDmXuatExcel(){
  const ma=(S.daCt&&(S.daCt.ma||S.daCt.ten))||('DA'+S.daId);
  if(S.mode!=="live"){
    const dt=_dmTinh(_dmDemoDs());
    const rows=[["STT","Loại","Tên","Quy cách","ĐVT","SL","Đơn giá","Thành tiền","Ghi chú"],
      ...dt.danh_sach.map((x,i)=>[i+1,(DA_DT_LOAI[x.loai]||x.loai).replace(/^[^ ]+ /,''),x.ten,x.quy_cach||'',x.don_vi||'',x.so_luong,x.don_gia,x.thanh_tien,x.ghi_chu||'']),
      ["","","","","","","TỔNG DỰ TOÁN",dt.tong_cong,""]];
    const csv='\ufeff'+rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
    const b=new Blob([csv],{type:'text/csv;charset=utf-8'}),u=URL.createObjectURL(b),a=document.createElement('a');
    a.href=u;a.download=`du-toan_${ma}.csv`;a.click();URL.revokeObjectURL(u);toast("Đã xuất CSV (demo)","ok");return;
  }
  try{
    const hd={}; if(S.token)hd['Authorization']='Bearer '+S.token;
    const r=await fetch(S.api+`/du-an/${S.daId}/du-toan/xuat-excel`,{headers:hd});
    if(!r.ok){toast("Không xuất được Excel","err");return;}
    const blob=await r.blob(),u=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=u;a.download=`du-toan_${String(ma).replace(/[\/\\]/g,'-')}.xlsx`;document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(u),4000);toast("Đã xuất Excel","ok");
  }catch(e){toast(e.message,"err");}
}

async function daDmAiNhap(){
  if(S.mode!=="live"){toast("AI đọc báo giá chạy ở bản kết nối backend","err");return;}
  const inp=document.getElementById('dm_ai_file'), f=inp&&inp.files[0];
  if(!f){toast("Chọn file báo giá (PDF, ảnh, Excel, CSV)","err");return;}
  const btn=document.getElementById('dm_ai_btn');
  if(btn){btn.disabled=true;btn.textContent="⏳ AI đang đọc file…";}
  try{
    const fd=new FormData(); fd.append('file',f); fd.append('loai',gv('dm_ai_loai')||'THIET_BI');
    const r=await apiUpload(`/du-an/${S.daId}/du-toan/ai-nhap`,fd);
    let msg=`✅ AI đã đổ ${r.them} mục vào dự toán`;
    if(r.bo_qua)msg+=` — bỏ qua ${r.bo_qua} mục trùng tên`;

  }catch(e){toast(e.detail||e.message,"err");}
  finally{if(btn){btn.disabled=false;btn.textContent="🤖 AI đọc & đổ vào dự toán";}}
}

  }else{
    if(DEMO_USERS.some(u=>u.email===email))return toast("Email đã tồn tại","err");
    DEMO_USERS.push({id:Math.max(...DEMO_USERS.map(u=>u.id))+1,email,vai_tro:vt,ten_vai_tro:ROLE_NAME[vt]||vt,trang_thai:"HOAT_DONG"});
  }
  document.getElementById('ktModal')?.remove();
  toast("Đã tạo tài khoản "+email+(S.mode==="demo"?" (demo — không lưu)":""));go('cau_hinh');
}
function chMoSua(id){
  const u=S._chUsers.find(x=>x.id===id);if(!u)return;
  _ktModal("Sửa người dùng — "+u.email,`
    <label>Email</label><input id="ch_email2" type="email" value="${u.email}">
    <label>Vai trò</label><select id="ch_vt2">${_chRoleOpts(u.vai_tro)}</select>
    <button class="btn-sm" style="margin-top:14px" onclick="chSua(${id})">Lưu thay đổi</button>`);
}
async function chSua(id){
  const email=$("#ch_email2").value.trim().toLowerCase(),vt=$("#ch_vt2").value,u=S._chUsers.find(x=>x.id===id);
  if(!email.includes('@'))return toast("Email không hợp lệ","err");
  if(S.mode==="live"){
    try{await api("/cau-hinh/nguoi-dung/"+id,{method:'PATCH',body:JSON.stringify({email,vai_tro:vt})});}
    catch(e){return toast(e.message,"err");}
  }else{
    if(DEMO_USERS.some(x=>x.email===email&&x.id!==id))return toast("Email đã tồn tại","err");
    u.email=email;u.vai_tro=vt;u.ten_vai_tro=ROLE_NAME[vt]||vt;
  }
  document.getElementById('ktModal')?.remove();
  toast("Đã lưu thay đổi"+(S.mode==="demo"?" (demo)":""));go('cau_hinh');
}
async function chXoa(id){
  const u=S._chUsers.find(x=>x.id===id);if(!u)return;
  if(!confirm("Xóa vĩnh viễn tài khoản "+u.email+"?\n\nNhật ký thao tác và hồ sơ nhân viên liên quan vẫn được GIỮ LẠI (chỉ gỡ liên kết với tài khoản). Không thể hoàn tác."))return;
  if(S.mode==="live"){
    try{await api("/cau-hinh/nguoi-dung/"+id,{method:'DELETE'});}
    catch(e){return toast(e.message,"err");}
  }else{
    const i=DEMO_USERS.findIndex(x=>x.id===id);if(i>=0)DEMO_USERS.splice(i,1);
  }
  toast("Đã xóa "+u.email+(S.mode==="demo"?" (demo)":""));go('cau_hinh');
}
function chMoDatMK(id){
  const u=S._chUsers.find(x=>x.id===id);if(!u)return;
  _ktModal("Đặt lại mật khẩu — "+u.email,`
    <label>Mật khẩu mới (tối thiểu 6 ký tự)</label><input id="ch_mk2" type="text">
    <button class="btn-sm" style="margin-top:14px" onclick="chDatMK(${id})">Đặt lại</button>`);
}
async function chDatMK(id){
  const mk=$("#ch_mk2").value;
  if(mk.length<6)return toast("Mật khẩu tối thiểu 6 ký tự","err");
  if(S.mode==="live"){
    try{await api("/cau-hinh/nguoi-dung/"+id+"/dat-lai-mat-khau",{method:'POST',body:JSON.stringify({mat_khau_moi:mk})});}
    catch(e){return toast(e.message,"err");}
  }
  document.getElementById('ktModal')?.remove();
  toast("Đã đặt lại mật khẩu"+(S.mode==="demo"?" (demo)":""));
}
async function chKhoa(id){
  const u=S._chUsers.find(x=>x.id===id);if(!u)return;
  const tt=u.trang_thai==="HOAT_DONG"?"KHOA":"HOAT_DONG";
  if(S.mode==="live"){
    try{await api("/cau-hinh/nguoi-dung/"+id,{method:'PATCH',body:JSON.stringify({trang_thai:tt})});}
    catch(e){return toast(e.message,"err");}
  }else{u.trang_thai=tt;}
  toast((tt==="KHOA"?"Đã khóa ":"Đã mở khóa ")+u.email+(S.mode==="demo"?" (demo)":""));go('cau_hinh');
}

/* ---------- Module khác (khung) ---------- */
function viewGeneric(m,mod){
  m.innerHTML=head(MODULES[mod].label, "Mức quyền của bạn: "+(LVL_LABEL[S.perm[pmod(mod)]]||S.perm[pmod(mod)]));
  m.innerHTML+=`<div class="panel"><div class="empty">
    <div class="big">Màn hình “${MODULES[mod].label}” đã có API đầy đủ ở backend</div>
    Lát cắt giao diện mẫu hiện minh họa Tổng quan, Kho và Bán hàng.<br>
    Các module còn lại dùng chung đúng khuôn này — mở <code>/docs</code> để xem ${countEndpoints(mod)} endpoint của module.
    <div style="margin-top:16px">${S.mode==="live"?`<a class="btn-sm" style="text-decoration:none" href="${S.api}/docs" target="_blank">Mở API docs</a>`:''}</div>
  </div></div>`;
}
function countEndpoints(){return "các";}
function head(title,sub){return `<div class="crumb">SVWS · ${S.roleName}</div>
  <div class="h-row"><h2>${title}</h2><p>${sub}</p></div>`;}
function logout(){
  try{localStorage.removeItem('svws_token');}catch(_){}
  S={mode:"demo",api:"",token:"",role:"",perm:{},page:"dashboard"};
  $("#app").classList.add('hidden');$("#login").classList.remove('hidden');$("#demoPill").classList.add('hidden');}

/* ---------- Ghi nhớ đăng nhập: điền sẵn email + tự vào lại bằng token đã lưu ---------- */
(function(){
  try{
    const em=localStorage.getItem('svws_email');
    if(em){const e=document.getElementById('email'); if(e&&!e.value)e.value=em;}
    const tk=localStorage.getItem('svws_token');
    if(tk&&(location.protocol==='http:'||location.protocol==='https:')){
      const api_=(localStorage.getItem('svws_api')||location.origin).replace(/\/$/,'');
      S={mode:"live",api:api_,token:tk,page:"dashboard"};
      api("/auth/quyen-cua-toi").then(q=>{
        S.role=q.vai_tro;S.roleName=q.ten_vai_tro;S.email=q.email;S.perm=q.quyen;
        startApp();
      }).catch(()=>{ // token hết hạn / máy chủ đổi — quay về màn đăng nhập
        try{localStorage.removeItem('svws_token');}catch(_){}
        S={mode:"demo",api:"",token:"",role:"",perm:{},page:"dashboard"};
      });
    }
  }catch(_){}
})();

/* Enter để đăng nhập */
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!$("#login").classList.contains('hidden'))doLogin();});
</script>
