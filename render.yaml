databases:
  - name: svws-db
    plan: free
    databaseName: svws
    user: svws

services:
  - type: web
    name: svws-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: svws-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STORAGE_DIR
        value: /tmp/svws_storage
